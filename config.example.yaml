# ============================================================
# 内容蒸馏 · baozangtuan77-content-distiller
# 把"蒸馏引擎"接到你自己的知识库和业务上。
#
# 用法：复制本文件为 config.yaml，按注释填写。
#       config.yaml 已被 .gitignore，不会上传——放心写你的真实业务。
#
# 下面是一个【虚构示例】：一位独立做"在线教育"的个人创业者，
# 同时服务 B 端企业培训客户、卖 C 端个人课程、做自己的知识 IP。
# 把它整体替换成你自己的。
# ============================================================

# 蒸馏产出写到哪个目录（相对你的知识库根目录）
output_dir: "knowledge/external-notes/"

# 产出文件命名模板。可用变量：{date} {author} {topic}
filename_template: "{date}-{author}-{topic}.md"

# ------------------------------------------------------------
# 你的禁用词：蒸馏时自动检查，命中就改写
# （填你自己写作里不想出现的"正确废话"词）
# ------------------------------------------------------------
banned_words:
  - 赋能
  - 闭环
  - 底层逻辑
  - 抓手
  - 范式

# ------------------------------------------------------------
# 战略 / 全景文档：蒸馏时读取，用于"业务映射"和"战略验证"
# 引擎会去读这些文件里的"开放问题 / 本周待办 / 阶段约束"等章节，
# 判断外部内容能不能回答你当下真正的问题。
# ------------------------------------------------------------
strategy_docs:
  - path: "strategy/business-plan.md"
    read_for: "公司定位 / 业务线 / 年度节奏 / 开放问题"
  - path: "strategy/current-projects.md"
    read_for: "当月重点 / 进行中项目 / 产品当前版本"

# 当前所处阶段（用于硬约束过滤；外部内容若与当前阶段冲突会被标 ⚠️）
current_stage:
  name: "打磨期"
  hard_constraints:
    - "不做重大冒险，先把现有业务做扎实"
    - "内容产出优先级 > 新功能开发"

# ------------------------------------------------------------
# 你的知识库目录：蒸馏时按主题对比，找 共识 / 冲突 / 盲区 / 深化
# 引擎会先 Glob 目录拿文件清单，再按外部内容的主题挑 5-15 个最相关的深读。
# ------------------------------------------------------------
knowledge_base_dirs:
  - label: "B端方法论"
    path: "knowledge/b2b-methodology/"
    compare_when: "外部内容是 B 端 / 企业服务 / 销售 / 交付视角"
  - label: "C端方法论"
    path: "knowledge/c2c-methodology/"
    compare_when: "外部内容是个人 IP / 内容运营 / 获客视角"

# ------------------------------------------------------------
# 你的业务维度：蒸馏的核心价值层。
# 引擎会把外部内容逐条映射回这些真实业务，而不是泛泛而谈。
# 每个维度填：从哪些源文件取信息 / 映射时要回答的问题 / 红线。
# ------------------------------------------------------------
business_dimensions:
  - name: "B端服务业务"
    source_fields: "当前客户与项目、利润门槛、交付模型"
    mapping_question: "对哪个具体项目的哪一步可用？能喂进我现有的哪个工作流？"
    redlines:
      - "低于利润门槛的项目，应用建议要标'时间成本 vs 收益'警示"

  - name: "C端产品"
    source_fields: "当前版本、已上线功能清单、待开发优先级"
    mapping_question: "能升级哪个功能 / prompt？能启发哪个待开发项？"
    redlines:
      - "源文件显示已做完的，不要建议'应该做'"

  - name: "个人IP"
    source_fields: "平台分工、IP 定位、内容系列"
    mapping_question: "能成为哪个平台的选题？热点话题的融入方式对不对？"
    redlines:
      - "不要把 IP 标签建议成某领域'专家'，如果你的定位不是"

# ------------------------------------------------------------
# 核心判断基准：映射时反复自问的几个问题（填你自己的战略锚点）
# ------------------------------------------------------------
core_judgment:
  - "这条内容有没有让我的核心竞争力更强？"
  - "它推的方向是否在我'不做什么'的清单里？如果在，标风险。"
